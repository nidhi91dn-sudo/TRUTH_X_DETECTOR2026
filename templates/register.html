<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Register | Truth-X Detector</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
<style>
body {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  overflow: hidden;
  position: relative;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(circle at 30% 70%, rgba(0,114,255,0.1) 0%, transparent 50%),
    radial-gradient(circle at 70% 20%, rgba(0,217,255,0.07) 0%, transparent 50%);
  pointer-events: none;
}

.grid-bg {
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(0,217,255,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,217,255,0.04) 1px, transparent 1px);
  background-size: 50px 50px;
  pointer-events: none;
}

.reg-card {
  width: 480px;
  background: rgba(6,20,46,0.92);
  border-radius: 20px;
  border: 1px solid rgba(0,217,255,0.18);
  padding: 52px 48px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 40px rgba(0,217,255,0.07);
  z-index: 2;
  animation: fadeUp 0.5s ease both;
}

.brand-name {
  font-size: 26px;
  font-weight: 800;
  color: var(--accent);
  letter-spacing: 1px;
}

.brand-sub {
  font-size: 15px;
  color: var(--muted);
  margin-top: 4px;
  margin-bottom: 28px;
}

.page-heading {
  font-size: 30px;
  font-weight: 700;
  color: #fff;
  margin-bottom: 6px;
}

.page-sub {
  font-size: 15px;
  color: var(--muted);
  margin-bottom: 28px;
}

.divider {
  height: 1px;
  background: var(--border);
  margin: 0 0 26px;
}

.error-msg {
  background: rgba(255,75,110,0.1);
  border: 1px solid rgba(255,75,110,0.35);
  border-radius: 10px;
  padding: 12px 16px;
  color: var(--red);
  font-size: 13px;
  margin-bottom: 18px;
  text-align: center;
}

.input-icon-wrap { position: relative; }
.input-icon {
  position: absolute;
  left: 14px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 15px;
  opacity: 0.5;
}

.form-input-icon {
  width: 100%;
  padding: 12px 16px 12px 42px;
  background: rgba(0,0,0,0.3);
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: 10px;
  color: #fff;
  font-size: 14px;
  outline: none;
  transition: 0.25s;
}

.form-input-icon:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(0,217,255,0.12);
}

.form-input-icon::placeholder { color: #3d5a7a; }

.reg-btn {
  width: 100%;
  padding: 13px;
  border: none;
  border-radius: 10px;
  background: linear-gradient(90deg, #0072ff, #00d9ff);
  color: #fff;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  letter-spacing: .5px;
  margin-top: 6px;
  transition: all 0.25s;
  box-shadow: 0 4px 20px rgba(0,114,255,0.4);
}

.reg-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 28px rgba(0,217,255,0.5);
}

.links {
  text-align: center;
  margin-top: 20px;
  font-size: 13.5px;
  color: var(--muted);
}

.links a { color: var(--accent); text-decoration: none; font-weight: 600; }
.links a:hover { text-decoration: underline; }
</style>
</head>
<body>

<div class="grid-bg"></div>

<div class="reg-card">

  <div class="brand-name">🛡 TRUTH-X-DETECTOR</div>
  <div class="brand-sub">AI-Powered Scam Detection System</div>

  <div class="divider"></div>

  <div class="page-heading">Create Account</div>
  <div class="page-sub">Sign up to start protecting yourself from scams</div>

  {% if error %}
  <div class="error-msg">⚠ {{ error }}</div>
  {% endif %}

  <form method="POST" action="/register">

    <div class="form-group">
      <label>Full Name</label>
      <div class="input-icon-wrap">
        <span class="input-icon">👤</span>
        <input class="form-input-icon" type="text" name="username" placeholder="Your name" value="{{ username if username else '' }}" required>
      </div>
    </div>

    <div class="form-group">
      <label>Email Address</label>
      <div class="input-icon-wrap">
        <span class="input-icon">📧</span>
        <input class="form-input-icon" type="email" name="email" placeholder="you@example.com" value="{{ email if email else '' }}" required>
      </div>
    </div>

    <div class="form-group">
      <label>Password</label>
      <div class="input-icon-wrap">
        <span class="input-icon">🔒</span>
        <input class="form-input-icon" type="password" name="password" placeholder="Create a strong password" required>
      </div>
    </div>

    <div class="form-group">
      <label>Confirm Password</label>
      <div class="input-icon-wrap">
        <span class="input-icon">✅</span>
        <input class="form-input-icon" type="password" name="confirm_password" placeholder="Repeat password" required>
      </div>
    </div>

    <button class="reg-btn" type="submit">🚀 Create Account</button>

  </form>

  <div class="links">
    Already have an account? <a href="/login">Login here</a>
  </div>

</div>

</body>
</html>
