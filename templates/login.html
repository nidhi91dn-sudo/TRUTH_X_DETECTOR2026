<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login | Truth-X Detector</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
<style>
body {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  overflow: hidden;
  position: relative;
}

/* animated particles bg */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(circle at 20% 20%, rgba(0,114,255,0.12) 0%, transparent 50%),
    radial-gradient(circle at 80% 80%, rgba(0,217,255,0.08) 0%, transparent 50%);
  pointer-events: none;
}

.grid-bg {
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(0,217,255,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,217,255,0.04) 1px, transparent 1px);
  background-size: 50px 50px;
  pointer-events: none;
}

/* login wrapper */
.login-wrap {
  display: flex;
  gap: 80px;
  align-items: center;
  z-index: 2;
  animation: fadeUp 0.6s ease both;
}

/* card */
.login-card {
  width: 440px;
  background: rgba(6,20,46,0.9);
  border-radius: 20px;
  border: 1px solid rgba(0,217,255,0.18);
  padding: 52px 48px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 40px rgba(0,217,255,0.08);
}

.brand {
  margin-bottom: 28px;
}

.brand-name {
  font-size: 26px;
  font-weight: 800;
  color: var(--accent);
  letter-spacing: 1px;
}

.brand-sub {
  font-size: 15px;
  color: var(--muted);
  margin-top: 4px;
}

.divider {
  height: 1px;
  background: var(--border);
  margin: 20px 0 26px;
}

.error-msg {
  background: rgba(255,75,110,0.1);
  border: 1px solid rgba(255,75,110,0.35);
  border-radius: 10px;
  padding: 12px 16px;
  color: var(--red);
  font-size: 13px;
  margin-bottom: 18px;
  text-align: center;
}

.input-icon-wrap {
  position: relative;
}

.input-icon {
  position: absolute;
  left: 14px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 16px;
  opacity: 0.5;
}

.form-input-icon {
  width: 100%;
  padding: 12px 16px 12px 42px;
  background: rgba(0,0,0,0.3);
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: 10px;
  color: #fff;
  font-size: 14px;
  outline: none;
  transition: 0.25s;
}

.form-input-icon:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(0,217,255,0.12);
}

.form-input-icon::placeholder { color: #3d5a7a; }

.login-btn {
  width: 100%;
  padding: 15px;
  border: none;
  border-radius: 10px;
  background: linear-gradient(90deg, #0072ff, #00d9ff);
  color: #fff;
  font-size: 17px;
  font-weight: 700;
  cursor: pointer;
  letter-spacing: .5px;
  margin-top: 6px;
  transition: all 0.25s;
  box-shadow: 0 4px 20px rgba(0,114,255,0.4);
}

.login-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 28px rgba(0,217,255,0.5);
}

.links {
  text-align: center;
  margin-top: 22px;
  font-size: 13.5px;
  color: var(--muted);
}

.links a { color: var(--accent); text-decoration: none; font-weight: 600; }
.links a:hover { text-decoration: underline; }

/* hero side */
.hero-side {
  text-align: center;
  animation: fadeUp 0.7s 0.15s ease both;
}

.hero-img {
  width: 380px;
  border-radius: 20px;
  box-shadow: 0 0 50px rgba(0,200,255,0.3);
  animation: float 5s infinite ease-in-out;
}

@keyframes float {
  0%,100% { transform: translateY(0); }
  50%      { transform: translateY(-16px); }
}

.hero-tag {
  margin-top: 20px;
  font-size: 13px;
  color: var(--muted);
  letter-spacing: .5px;
}

.hero-tag strong { color: var(--accent); }

@media (max-width: 800px) {
  .hero-side { display: none; }
  .login-wrap { justify-content: center; }
}
</style>
</head>
<body>

<div class="grid-bg"></div>

<div class="login-wrap">

  <!-- CARD -->
  <div class="login-card">

    <div class="brand">
      <div class="brand-name">🛡 TRUTH-X-DETECTOR</div>
      <div class="brand-sub">AI-Powered Scam Detection System</div>
    </div>

    <div class="divider"></div>

    {% if error %}
    <div class="error-msg">⚠ {{ error }}</div>
    {% endif %}

    <form method="POST" action="/login">

      <div class="form-group">
        <label>Username or Email</label>
        <div class="input-icon-wrap">
          <span class="input-icon">👤</span>
          <input class="form-input-icon" type="text" name="username" placeholder="Enter username or email" required>
        </div>
      </div>

      <div class="form-group">
        <label>Password</label>
        <div class="input-icon-wrap">
          <span class="input-icon">🔒</span>
          <input class="form-input-icon" type="password" name="password" placeholder="Enter password" required>
        </div>
      </div>

      <button class="login-btn" type="submit">Login →</button>

    </form>

    <div class="links">
      <p style="margin-top:16px;">New here? <a href="/register">Create an account</a></p>
    </div>

  </div>

  <!-- HERO SIDE -->
  <div class="hero-side">
    <img class="hero-img" src="{{ url_for('static', filename='images/login_shield.png') }}" alt="AI Shield" onerror="this.style.display='none'">
    <div class="hero-tag">Powered by <strong>Truth-X AI Engine v2</strong></div>
  </div>

</div>

</body>
</html>
